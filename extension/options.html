<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智拓 设置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">智拓</p>
        <h1>浏览器插件设置</h1>
        <p class="slogan">智启新知，拓学无界</p>
        <p class="hero-text">
          填好模型接口之后，插件就可以在题目页里直接识别题面、生成答案并填充回编辑器。
        </p>
      </section>

      <section class="card">
        <form id="settings-form" class="form">
          <label class="field">
            <span class="field-head">
              <span>文本 API Key</span>
              <a
                id="textApiKeyPortalLink"
                class="field-link"
                href="#"
                target="_blank"
                rel="noreferrer noopener"
              >去获取 API Key</a>
            </span>
            <input
              id="textApiKey"
              name="textApiKey"
              type="password"
              placeholder="sk-..."
              autocomplete="off"
            />
            <small id="textApiKeyHelp">保存在当前浏览器本地，不会写进这个仓库。</small>
          </label>

          <div class="field">
            <span>选择题提示词</span>
            <textarea
              id="extraInstructionsChoice"
              name="extraInstructionsChoice"
              rows="6"
              placeholder="用于选择题、判断题、概念题。"
            ></textarea>
            <small>选择题模式下会读取这里的提示词。</small>
            <div class="actions">
              <button type="button" id="restoreChoicePrompt" class="secondary">恢复选择题默认</button>
            </div>
          </div>

          <div class="field">
            <span>代码题提示词</span>
            <textarea
              id="extraInstructionsCode"
              name="extraInstructionsCode"
              rows="6"
              placeholder="用于编程题、补全题、代码填空题。"
            ></textarea>
            <small>代码题模式下会读取这里的提示词。</small>
            <div class="actions">
              <button type="button" id="restoreCodePrompt" class="secondary">恢复代码题默认</button>
            </div>
          </div>

          <label class="field">
            <span>全自动模式快捷键</span>
            <input
              id="fullAutoShortcut"
              name="fullAutoShortcut"
              type="text"
              placeholder="Alt+Shift+A"
            />
            <small>按下后会直接触发“开启全自动/停止全自动”，效果等同点击面板里的全自动按钮。</small>
          </label>

          <label class="field">
            <span>全自动下一题等待时间（毫秒）</span>
            <input
              id="fullAutoNextDelayMs"
              name="fullAutoNextDelayMs"
              type="number"
              min="500"
              max="15000"
              step="100"
              placeholder="3000"
            />
            <small>全自动模式点击“下一题”后，至少固定等待多久再继续处理下一题。数值越大越稳，但整体速度会更慢。</small>
          </label>

          <label class="field">
            <span>自动勾选后等待时间（毫秒）</span>
            <input
              id="autoPickNextDelayMs"
              name="autoPickNextDelayMs"
              type="number"
              min="100"
              max="5000"
              step="50"
              placeholder="600"
            />
            <small>选择题模式下，AI 返回答案后，自动点击“下一题”前会额外等待多久。若页面勾选选项较慢，可以把这里调大。</small>
          </label>

          <div class="field">
            <span>GitHub 贡献</span>
            <div id="authSessionSummary" class="status">无需登录 GitHub；提交时会打开预填好的 Issue 页面。</div>
            <small>下载云端题库不需要登录；贡献题目会跳转到 GitHub Issue，由仓库中的 Actions 自动校验并生成待审核更新。</small>
          </div>

          <label class="field">
            <span>贡献邮箱</span>
            <input
              id="contributionEmail"
              name="contributionEmail"
              type="email"
              placeholder="you@example.com"
              autocomplete="email"
            />
            <small>仅用于题库贡献标记和后续人工发放额度，不做登录验证。</small>
          </label>

          <label class="toggle-field" for="cloudAutoSync">
            <span class="toggle-copy">
              <strong>启动时自动下载云端题库</strong>
              <small>开启后，面板初始化时会自动从 GitHub 下载云端题库并合并到本地缓存；当前网络需要能访问 GitHub。</small>
            </span>
            <input id="cloudAutoSync" name="cloudAutoSync" type="checkbox" />
          </label>

          <div class="field">
            <span>当前云端仓库</span>
            <div id="cloudRepoSummary" class="status">liuhexiong/question-bank@main</div>
            <small>云端题库配置已固定，不再需要手动填写。</small>
          </div>

          <div class="actions">
            <button type="submit" class="primary">保存设置</button>
            <button type="button" id="reset" class="secondary">恢复默认</button>
          </div>

          <p id="status" class="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="solve-models.js"></script>
    <script src="options.js"></script>
  </body>
</html>
